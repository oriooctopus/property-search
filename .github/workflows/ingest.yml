name: Ingest (new pipeline, soak)

on:
  # Re-enabled 2026-06-29 as a single daily run. The Apify-cost concern that
  # forced the 2026-05-06 shutdown no longer applies: StreetEasy now fetches
  # via the FREE direct api-v6 endpoint (single atomic page per bedroom slice,
  # Apify only as a 403 fallback). Stale detection is the free set-difference
  # delist-unseen step (see below) instead of the per-listing verify-stale path.
  schedule:
    - cron: "0 16 * * *" # daily full refetch of the in-region 2–4BR set
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources (e.g. streeteasy,craigslist). Empty = all."
        required: false
        default: ""
      dry_run:
        description: "Dry-run (no DB writes)"
        required: false
        default: "false"
      verify_only:
        description: "Run only the verify-stale phase (skip scrape/normalize/ingest/enrich)"
        required: false
        default: "false"

concurrency:
  group: ingest-daily
  cancel-in-progress: false

jobs:
  # Fetch + normalize + upsert + enrichment. Skips verify-stale, which runs
  # in parallel in the verify-stale job below. Together they replace the old
  # single-job ingest that was hitting the 60-min cap (verify-stale alone needs
  # ~67 min at concurrency=4; fetch+normalize+upsert+enrich needs ~45 min).
  #
  # Safe to run concurrently with verify-stale: fetch only inserts/upserts new
  # listings (different rows), verify-stale only updates delisted_at on
  # existing listings (different rows + different columns) — no DB write
  # contention.
  fetch:
    # Skip the fetch job entirely on the 22:00 verify-only cron — that pass
    # exists to drain the verify-stale backlog without re-running fetch.
    if: github.event.schedule != '0 22 * * *' && github.event.inputs.verify_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run ingest (fetch phases — skip verify-stale)
        working-directory: web
        env:
          APIFY_PROXY_URL: ${{ secrets.APIFY_PROXY_URL }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REFRESH_STALE_HOURS: "24"
          INPUT_SOURCES: ${{ github.event.inputs.sources }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS="--fetch-strategy=staleness-gated --skip-phase=verify-stale"
          echo "Mode: FETCH (skip verify-stale; runs in parallel job)"
          if [ -n "$INPUT_SOURCES" ]; then
            ARGS="$ARGS --sources=$INPUT_SOURCES"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: npx tsx scripts/ingest.ts $ARGS"
          npx tsx scripts/ingest.ts $ARGS

      # Free set-difference stale detection for StreetEasy: the fetch above
      # refreshed last_seen_at for every active in-region 2–4BR listing, so any
      # that weren't refreshed are gone → delisted. Safety-gated (won't delist
      # if the fraction is implausibly large, i.e. the fetch was incomplete).
      # Replaces the paid per-listing verify-stale path for StreetEasy.
      - name: Delist unseen StreetEasy listings (set-difference)
        if: github.event.inputs.dry_run != 'true'
        working-directory: web
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/delist-unseen.ts

  # Verify-stale only. Runs in parallel with fetch on the 16:00 cron, and is
  # the sole job on the 22:00 catch-up cron. Updates delisted_at on existing
  # listings — does not insert new rows.
  verify-stale:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run ingest (verify-stale only)
        working-directory: web
        env:
          APIFY_PROXY_URL: ${{ secrets.APIFY_PROXY_URL }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REFRESH_STALE_HOURS: "24"
          INPUT_SOURCES: ${{ github.event.inputs.sources }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS="--fetch-strategy=staleness-gated --only-phase=verify-stale"
          echo "Mode: VERIFY-STALE only"
          if [ -n "$INPUT_SOURCES" ]; then
            ARGS="$ARGS --sources=$INPUT_SOURCES"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: npx tsx scripts/ingest.ts $ARGS"
          npx tsx scripts/ingest.ts $ARGS
