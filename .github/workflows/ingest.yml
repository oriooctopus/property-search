name: Ingest (new pipeline, soak)

on:
  schedule:
    # Full pipeline: once daily at noon ET (16:00 UTC, 17:00 UTC during EST)
    - cron: "0 16 * * *"
    # Verify-only pass: 6 hours offset from the main run (22:00 UTC = 6pm ET).
    # The full daily pipeline can only chew through ~3000 stale candidates per
    # day (per-source quota in verify-stale), so for a backlog like Craigslist's
    # ~970-row queue it'd take days to drain. Adding this second pass doubles
    # throughput without re-running scrape/normalize/upsert/enrich.
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources (e.g. streeteasy,craigslist). Empty = all."
        required: false
        default: ""
      dry_run:
        description: "Dry-run (no DB writes)"
        required: false
        default: "false"
      verify_only:
        description: "Run only the verify-stale phase (skip scrape/normalize/ingest/enrich)"
        required: false
        default: "false"

concurrency:
  group: ingest-daily
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run ingest (new pipeline)
        working-directory: web
        env:
          APIFY_PROXY_URL: ${{ secrets.APIFY_PROXY_URL }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REFRESH_STALE_HOURS: "24"
          INPUT_SOURCES: ${{ github.event.inputs.sources }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_VERIFY_ONLY: ${{ github.event.inputs.verify_only }}
          # The 22:00 UTC cron is the verify-only pass; the 16:00 UTC cron and
          # any manual dispatch run the full pipeline (unless verify_only=true).
          SCHEDULED_CRON: ${{ github.event.schedule }}
        run: |
          if [ "$SCHEDULED_CRON" = "0 22 * * *" ] || [ "$INPUT_VERIFY_ONLY" = "true" ]; then
            ARGS="--fetch-strategy=staleness-gated --only-phase=verify-stale"
            echo "Mode: VERIFY-ONLY (catch-up pass for stale-detection backlog)"
          else
            ARGS="--fetch-strategy=staleness-gated"
            echo "Mode: FULL pipeline"
          fi
          if [ -n "$INPUT_SOURCES" ]; then
            ARGS="$ARGS --sources=$INPUT_SOURCES"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: npx tsx scripts/ingest.ts $ARGS"
          npx tsx scripts/ingest.ts $ARGS
