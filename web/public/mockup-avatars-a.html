<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup A: Stacked Overlapping Avatars</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    color: #e1e4e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #e1e4e8;
  }
  .subtitle {
    color: #8b949e;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .card {
    background: #1c2028;
    border: 1px solid #2d333b;
    border-radius: 12px;
    width: 380px;
    overflow: hidden;
  }
  .photo {
    width: 100%;
    height: 220px;
    background: linear-gradient(135deg, #2d333b 0%, #1c2028 50%, #2d333b 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-icon {
    color: #8b949e;
    font-size: 48px;
    opacity: 0.4;
  }
  .photo-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(15, 17, 23, 0.75);
    backdrop-filter: blur(8px);
    color: #e1e4e8;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .card-body {
    padding: 16px;
  }
  .price {
    font-size: 22px;
    font-weight: 700;
    color: #e1e4e8;
    margin-bottom: 4px;
  }
  .address {
    font-size: 14px;
    color: #8b949e;
    margin-bottom: 8px;
  }
  .details {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 16px;
  }
  .details span {
    color: #e1e4e8;
    font-weight: 500;
  }
  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .btn-live {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: #f0883e;
    color: #fff;
    transition: background 0.15s;
  }
  .btn-live:hover { background: #d97730; }
  .btn-fav {
    padding: 10px 14px;
    border: 1px solid #2d333b;
    border-radius: 8px;
    background: transparent;
    color: #8b949e;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-fav:hover { border-color: #58a6ff; color: #58a6ff; }

  /* Mockup A: Stacked overlapping avatars */
  .avatar-row {
    display: flex;
    align-items: center;
    gap: 0;
    padding-top: 12px;
    border-top: 1px solid #2d333b;
  }
  .avatar-stack {
    display: flex;
  }
  .avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    border: 2px solid #1c2028;
    margin-left: -8px;
    position: relative;
  }
  .avatar:first-child { margin-left: 0; }
  .avatar-1 { background: #58a6ff; z-index: 4; }
  .avatar-2 { background: #7ee787; z-index: 3; }
  .avatar-3 { background: #d2a8ff; z-index: 2; }
  .avatar-4 { background: #f0883e; z-index: 1; }
  .avatar-count {
    font-size: 13px;
    color: #8b949e;
    margin-left: 10px;
  }
  .avatar-count strong {
    color: #58a6ff;
    font-weight: 600;
  }
</style>
</head>
<body>
  <h1>Mockup A: Stacked Overlapping Avatars</h1>
  <p class="subtitle">Compact overlapping avatar circles with count text</p>

  <div class="card">
    <div class="photo">
      <div class="photo-icon">&#x1f3e0;</div>
      <div class="photo-badge">3 bed / 2 bath</div>
    </div>
    <div class="card-body">
      <div class="price">$1,250,000</div>
      <div class="address">742 Evergreen Terrace, Brooklyn, NY 11201</div>
      <div class="details">
        <div><span>3</span> beds</div>
        <div><span>2</span> baths</div>
        <div><span>1,850</span> sqft</div>
      </div>

      <div class="actions">
        <button class="btn-live">I Would Live There</button>
        <button class="btn-fav">&hearts;</button>
      </div>

      <div class="avatar-row">
        <div class="avatar-stack">
          <div class="avatar avatar-1">JM</div>
          <div class="avatar avatar-2">SK</div>
          <div class="avatar avatar-3">AL</div>
          <div class="avatar avatar-4">RB</div>
        </div>
        <div class="avatar-count"><strong>+3</strong> would live here</div>
      </div>
    </div>
  </div>
</body>
</html>
