<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Art Deco: People Under a Roof -->

  <!-- Radiating sunburst rays behind roof -->
  <line x1="24" y1="16" x2="24" y2="4" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="16" x2="14" y2="5" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="16" x2="34" y2="5" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="16" x2="8" y2="8" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="16" x2="40" y2="8" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="16" x2="5" y2="12" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="16" x2="43" y2="12" stroke="#fff" stroke-width="0.5"/>

  <!-- Outer octagonal frame -->
  <polygon points="18,4 30,4 44,18 44,30 30,44 18,44 4,30 4,18" fill="none" stroke="#fff" stroke-width="1.5"/>
  <polygon points="19,6 29,6 42,19 42,29 29,42 19,42 6,29 6,19" fill="none" stroke="#fff" stroke-width="0.5"/>

  <!-- White background behind people area -->
  <rect x="8" y="16" width="32" height="26" fill="#fff"/>

  <!-- Triangular roof/pediment -->
  <polygon points="24,12 40,22 8,22" fill="#fff" stroke="#fff" stroke-width="1.5"/>
  <polygon points="24,14.5 37,22 11,22" fill="none" stroke="#fff" stroke-width="0.5"/>

  <!-- Roof peak accent -->
  <circle cx="24" cy="14" r="1" fill="#fff"/>

  <!-- Person 1 (left) - geometric art deco silhouette -->
  <circle cx="18" cy="27" r="2.5" fill="#fff"/>
  <!-- Angular shoulders and body -->
  <polygon points="14,30 22,30 21,36 18,38 15,36" fill="#fff"/>
  <!-- Legs -->
  <rect x="15.5" y="36" width="1.5" height="4" fill="#fff"/>
  <rect x="19" y="36" width="1.5" height="4" fill="#fff"/>

  <!-- Person 2 (right) - geometric art deco silhouette -->
  <circle cx="30" cy="27" r="2.5" fill="#fff"/>
  <!-- Angular shoulders and body -->
  <polygon points="26,30 34,30 33,36 30,38 27,36" fill="#fff"/>
  <!-- Legs -->
  <rect x="27.5" y="36" width="1.5" height="4" fill="#fff"/>
  <rect x="31" y="36" width="1.5" height="4" fill="#fff"/>

  <!-- Stepped corner accents -->
  <rect x="7" y="7" width="3" height="1" fill="#fff"/>
  <rect x="8" y="8" width="1" height="2" fill="#fff"/>
  <rect x="38" y="7" width="3" height="1" fill="#fff"/>
  <rect x="39" y="8" width="1" height="2" fill="#fff"/>
  <rect x="7" y="40" width="3" height="1" fill="#fff"/>
  <rect x="8" y="38" width="1" height="2" fill="#fff"/>
  <rect x="38" y="40" width="3" height="1" fill="#fff"/>
  <rect x="39" y="38" width="1" height="2" fill="#fff"/>
</svg>