<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48">
  <!-- Full wordmark - white on dark (for dark backgrounds) -->

  <!-- Icon: Art Deco Eye (Option 4, white version) -->
  <g>
    <!-- Radiating lines -->
    <line x1="24" y1="24" x2="24" y2="6" stroke="#fff" stroke-width="0.5"/>
    <line x1="24" y1="24" x2="10" y2="10" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="38" y2="10" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="6" y2="17" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="42" y2="17" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="5" y2="24" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="43" y2="24" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="6" y2="31" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="42" y2="31" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="10" y2="38" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="38" y2="38" stroke="#fff" stroke-width="0.4"/>
    <line x1="24" y1="24" x2="24" y2="42" stroke="#fff" stroke-width="0.5"/>

    <!-- Octagonal frame -->
    <polygon points="18,5 30,5 43,18 43,30 30,43 18,43 5,30 5,18" fill="none" stroke="#fff" stroke-width="1.5"/>

    <!-- Eye shape -->
    <path d="M5 24 Q14 13 24 13 Q34 13 43 24 Q34 35 24 35 Q14 35 5 24 Z" fill="#fff" stroke="#fff" stroke-width="1.5"/>

    <!-- Iris -->
    <circle cx="24" cy="24" r="6.5" fill="#fff"/>
    <!-- Pupil -->
    <circle cx="24" cy="24" r="3.5" fill="#fff"/>
    <!-- Inner dot -->
    <circle cx="24" cy="24" r="1.5" fill="#fff"/>
    <!-- Iris ring -->
    <circle cx="24" cy="24" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>

    <!-- Brow lines -->
    <path d="M7 21 Q15 14 24 14 Q33 14 41 21" fill="none" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Text: DWELLIGENCE -->
  <text x="56" y="32" font-family="Futura, 'Century Gothic', 'Avant Garde', sans-serif" font-size="18" font-weight="bold" fill="#fff" letter-spacing="4">DWELLIGENCE</text>

  <!-- Decorative line under text -->
  <line x1="56" y1="37" x2="232" y2="37" stroke="#fff" stroke-width="0.75"/>
  <line x1="56" y1="39" x2="232" y2="39" stroke="#fff" stroke-width="0.3"/>

  <!-- Small deco accents at text line ends -->
  <rect x="56" y="36" width="3" height="1" fill="#fff"/>
  <rect x="229" y="36" width="3" height="1" fill="#fff"/>
</svg>