<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Art Deco Letter D -->

  <!-- Outer diamond frame -->
  <polygon points="24,2 44,24 24,46 4,24" fill="none" stroke="#fff" stroke-width="1.5"/>
  <polygon points="24,5 41,24 24,43 7,24" fill="none" stroke="#fff" stroke-width="0.5"/>

  <!-- The letter D - bold geometric art deco style -->
  <!-- Vertical stroke -->
  <rect x="14" y="14" width="4" height="20" fill="#fff"/>

  <!-- Top horizontal -->
  <rect x="14" y="14" width="10" height="3" fill="#fff"/>

  <!-- Bottom horizontal -->
  <rect x="14" y="31" width="10" height="3" fill="#fff"/>

  <!-- Curved right side (geometric approximation) -->
  <path d="M24 14 L28 14 L32 17 L34 21 L34 27 L32 31 L28 34 L24 34 L24 31 L27 31 L29 29 L30 26 L30 22 L29 19 L27 17 L24 17 Z" fill="#fff"/>

  <!-- Inner deco detail - chevron inside the D -->
  <polyline points="19,21 22,24 19,27" fill="none" stroke="#fff" stroke-width="1"/>

  <!-- Sunburst lines radiating from top -->
  <line x1="24" y1="5" x2="24" y2="2" stroke="#fff" stroke-width="0.75"/>
  <line x1="24" y1="5" x2="20" y2="2.5" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="5" x2="28" y2="2.5" stroke="#fff" stroke-width="0.5"/>

  <!-- Decorative dots at compass points -->
  <circle cx="24" cy="3" r="0.75" fill="#fff"/>
  <circle cx="43" cy="24" r="0.75" fill="#fff"/>
  <circle cx="24" cy="45" r="0.75" fill="#fff"/>
  <circle cx="5" cy="24" r="0.75" fill="#fff"/>

  <!-- Small stepped accents -->
  <rect x="10" y="23" width="2" height="2" fill="#fff"/>
  <rect x="36" y="23" width="2" height="2" fill="#fff"/>
</svg>