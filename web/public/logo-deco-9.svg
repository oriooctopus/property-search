<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Art Deco: Community Circle -->

  <!-- Radiating lines from center -->
  <line x1="24" y1="24" x2="24" y2="4" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="8" y2="8" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="40" y2="8" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="4" y2="16" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="44" y2="16" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="4" y2="24" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="44" y2="24" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="4" y2="32" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="44" y2="32" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="8" y2="40" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="40" y2="40" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="24" x2="24" y2="44" stroke="#fff" stroke-width="0.5"/>

  <!-- Outer octagonal frame -->
  <polygon points="18,4 30,4 44,18 44,30 30,44 18,44 4,30 4,18" fill="none" stroke="#fff" stroke-width="1.5"/>
  <polygon points="19,6 29,6 42,19 42,29 29,42 19,42 6,29 6,19" fill="none" stroke="#fff" stroke-width="0.5"/>

  <!-- Central white circle background -->
  <circle cx="24" cy="24" r="14" fill="#fff"/>
  <circle cx="24" cy="24" r="14" fill="none" stroke="#fff" stroke-width="1"/>
  <circle cx="24" cy="24" r="12.5" fill="none" stroke="#fff" stroke-width="0.3"/>

  <!-- Central house/building shape -->
  <!-- House body -->
  <rect x="20" y="22" width="8" height="7" fill="#fff"/>
  <!-- Roof -->
  <polygon points="24,17 30,22 18,22" fill="#fff"/>
  <!-- Door -->
  <rect x="22.5" y="25" width="3" height="4" fill="#fff"/>
  <!-- Window -->
  <rect x="25.5" y="23" width="1.5" height="1.5" fill="#fff"/>

  <!-- Person 1 (top-left) -->
  <circle cx="14" cy="16" r="1.8" fill="#fff"/>
  <polygon points="11.5,18 16.5,18 15.8,22 14,23 12.2,22" fill="#fff"/>

  <!-- Person 2 (top-right) -->
  <circle cx="34" cy="16" r="1.8" fill="#fff"/>
  <polygon points="31.5,18 36.5,18 35.8,22 34,23 32.2,22" fill="#fff"/>

  <!-- Person 3 (bottom-left) -->
  <circle cx="14" cy="32" r="1.8" fill="#fff"/>
  <polygon points="11.5,34 16.5,34 15.8,38 14,39 12.2,38" fill="#fff"/>

  <!-- Person 4 (bottom-right) -->
  <circle cx="34" cy="32" r="1.8" fill="#fff"/>
  <polygon points="31.5,34 36.5,34 35.8,38 34,39 32.2,38" fill="#fff"/>

  <!-- Connecting lines from people to house (community bonds) -->
  <line x1="14" y1="18" x2="20" y2="22" stroke="#fff" stroke-width="0.5"/>
  <line x1="34" y1="18" x2="28" y2="22" stroke="#fff" stroke-width="0.5"/>
  <line x1="14" y1="32" x2="20" y2="28" stroke="#fff" stroke-width="0.5"/>
  <line x1="34" y1="32" x2="28" y2="28" stroke="#fff" stroke-width="0.5"/>

  <!-- Stepped corner accents -->
  <rect x="7" y="7" width="3" height="1" fill="#fff"/>
  <rect x="8" y="8" width="1" height="2" fill="#fff"/>
  <rect x="38" y="7" width="3" height="1" fill="#fff"/>
  <rect x="39" y="8" width="1" height="2" fill="#fff"/>
  <rect x="7" y="40" width="3" height="1" fill="#fff"/>
  <rect x="8" y="38" width="1" height="2" fill="#fff"/>
  <rect x="38" y="40" width="3" height="1" fill="#fff"/>
  <rect x="39" y="38" width="1" height="2" fill="#fff"/>
</svg>