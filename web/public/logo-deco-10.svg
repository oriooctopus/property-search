<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Art Deco: House Shield with Figures -->

  <!-- Outer octagonal frame -->
  <polygon points="18,4 30,4 44,18 44,30 30,44 18,44 4,30 4,18" fill="none" stroke="#fff" stroke-width="1.5"/>
  <polygon points="19,6 29,6 42,19 42,29 29,42 19,42 6,29 6,19" fill="none" stroke="#fff" stroke-width="0.5"/>

  <!-- Shield/crest shape -->
  <path d="M24,7 L38,14 L38,30 Q38,40 24,44 Q10,40 10,30 L10,14 Z" fill="#fff" stroke="#fff" stroke-width="1.5"/>
  <!-- Inner shield line -->
  <path d="M24,9 L36,15 L36,29 Q36,38 24,42 Q12,38 12,29 L12,15 Z" fill="none" stroke="#fff" stroke-width="0.5"/>

  <!-- Chevron details in shield -->
  <line x1="12" y1="20" x2="24" y2="16" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="16" x2="36" y2="20" stroke="#fff" stroke-width="0.5"/>
  <line x1="12" y1="22" x2="24" y2="18" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="18" x2="36" y2="22" stroke="#fff" stroke-width="0.5"/>

  <!-- House silhouette at top of shield -->
  <polygon points="24,11 32,17 16,17" fill="#fff"/>
  <rect x="18" y="17" width="12" height="7" fill="#fff"/>
  <!-- House door -->
  <rect x="22" y="19" width="4" height="5" fill="#fff"/>
  <!-- House windows -->
  <rect x="19" y="18.5" width="2" height="2" fill="#fff"/>
  <rect x="27" y="18.5" width="2" height="2" fill="#fff"/>

  <!-- Heraldic figure 1 (left) - geometric person -->
  <circle cx="16" cy="29" r="1.8" fill="#fff"/>
  <polygon points="13.5,31 18.5,31 17.8,35 16,36 14.2,35" fill="#fff"/>
  <rect x="14.5" y="35" width="1" height="3" fill="#fff"/>
  <rect x="16.5" y="35" width="1" height="3" fill="#fff"/>

  <!-- Heraldic figure 2 (right) - geometric person -->
  <circle cx="32" cy="29" r="1.8" fill="#fff"/>
  <polygon points="29.5,31 34.5,31 33.8,35 32,36 30.2,35" fill="#fff"/>
  <rect x="30.5" y="35" width="1" height="3" fill="#fff"/>
  <rect x="32.5" y="35" width="1" height="3" fill="#fff"/>

  <!-- Figures' arms reaching toward house (heraldic supporters) -->
  <line x1="18" y1="32" x2="21" y2="24" stroke="#fff" stroke-width="0.75"/>
  <line x1="30" y1="32" x2="27" y2="24" stroke="#fff" stroke-width="0.75"/>

  <!-- Decorative dots between chevrons -->
  <circle cx="24" cy="27" r="0.8" fill="#fff"/>

  <!-- Stepped corner accents -->
  <rect x="7" y="7" width="3" height="1" fill="#fff"/>
  <rect x="8" y="8" width="1" height="2" fill="#fff"/>
  <rect x="38" y="7" width="3" height="1" fill="#fff"/>
  <rect x="39" y="8" width="1" height="2" fill="#fff"/>
  <rect x="7" y="40" width="3" height="1" fill="#fff"/>
  <rect x="8" y="38" width="1" height="2" fill="#fff"/>
  <rect x="38" y="40" width="3" height="1" fill="#fff"/>
  <rect x="39" y="38" width="1" height="2" fill="#fff"/>
</svg>