<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Art Deco Keyhole/Doorway -->

  <!-- Outer stepped frame -->
  <rect x="4" y="4" width="40" height="40" fill="none" stroke="#fff" stroke-width="1.5"/>
  <rect x="7" y="7" width="34" height="34" fill="none" stroke="#fff" stroke-width="1"/>
  <rect x="9.5" y="9.5" width="29" height="29" fill="none" stroke="#fff" stroke-width="0.5"/>

  <!-- Corner deco elements -->
  <rect x="4" y="4" width="4" height="4" fill="#fff"/>
  <rect x="40" y="4" width="4" height="4" fill="#fff"/>
  <rect x="4" y="40" width="4" height="4" fill="#fff"/>
  <rect x="40" y="40" width="4" height="4" fill="#fff"/>

  <!-- Arch doorway -->
  <path d="M17 38 L17 20 Q17 12 24 12 Q31 12 31 20 L31 38 Z" fill="#fff"/>

  <!-- Keyhole circle (white cutout) -->
  <circle cx="24" cy="21" r="4.5" fill="#fff"/>

  <!-- Keyhole slot (white cutout) -->
  <rect x="22" y="24" width="4" height="10" fill="#fff"/>

  <!-- Inner keyhole detail -->
  <circle cx="24" cy="21" r="2.5" fill="#fff"/>
  <rect x="23" y="23" width="2" height="7" fill="#fff"/>

  <!-- Radiating lines above arch -->
  <line x1="24" y1="9.5" x2="24" y2="7" stroke="#fff" stroke-width="0.75"/>
  <line x1="24" y1="10" x2="20" y2="7.5" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="10" x2="28" y2="7.5" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="10" x2="16" y2="8" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="10" x2="32" y2="8" stroke="#fff" stroke-width="0.5"/>

  <!-- Step details on sides of door -->
  <rect x="14" y="30" width="3" height="1" fill="#fff"/>
  <rect x="31" y="30" width="3" height="1" fill="#fff"/>
  <rect x="13" y="33" width="4" height="1" fill="#fff"/>
  <rect x="31" y="33" width="4" height="1" fill="#fff"/>
  <rect x="12" y="36" width="5" height="1" fill="#fff"/>
  <rect x="31" y="36" width="5" height="1" fill="#fff"/>

  <!-- Threshold -->
  <rect x="15" y="38" width="18" height="1.5" fill="#fff"/>
</svg>