<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Art Deco House + Sunburst -->

  <!-- Sunburst fan rays (behind house) -->
  <line x1="24" y1="20" x2="24" y2="2" stroke="#fff" stroke-width="0.75"/>
  <line x1="24" y1="20" x2="16" y2="3" stroke="#fff" stroke-width="0.6"/>
  <line x1="24" y1="20" x2="32" y2="3" stroke="#fff" stroke-width="0.6"/>
  <line x1="24" y1="20" x2="9" y2="5" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="20" x2="39" y2="5" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="20" x2="4" y2="9" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="20" x2="44" y2="9" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="20" x2="2" y2="14" stroke="#fff" stroke-width="0.4"/>
  <line x1="24" y1="20" x2="46" y2="14" stroke="#fff" stroke-width="0.4"/>
  <line x1="24" y1="20" x2="2" y2="19" stroke="#fff" stroke-width="0.4"/>
  <line x1="24" y1="20" x2="46" y2="19" stroke="#fff" stroke-width="0.4"/>

  <!-- Concentric arcs for sunburst depth -->
  <path d="M8 8 Q16 3 24 2 Q32 3 40 8" fill="none" stroke="#fff" stroke-width="0.5"/>
  <path d="M5 14 Q14 7 24 6 Q34 7 43 14" fill="none" stroke="#fff" stroke-width="0.4"/>

  <!-- House body -->
  <rect x="10" y="22" width="28" height="20" fill="#fff"/>

  <!-- Roof - stepped art deco -->
  <polygon points="24,14 38,22 10,22" fill="#fff"/>
  <!-- Roof accent line -->
  <polygon points="24,16 35,22 13,22" fill="none" stroke="#fff" stroke-width="0.5"/>

  <!-- Chimney -->
  <rect x="32" y="16" width="3" height="6" fill="#fff"/>

  <!-- Windows - top row -->
  <rect x="14" y="25" width="4" height="4" fill="#fff"/>
  <rect x="22" y="25" width="4" height="4" fill="#fff"/>
  <rect x="30" y="25" width="4" height="4" fill="#fff"/>

  <!-- Window crosses -->
  <line x1="16" y1="25" x2="16" y2="29" stroke="#fff" stroke-width="0.5"/>
  <line x1="14" y1="27" x2="18" y2="27" stroke="#fff" stroke-width="0.5"/>
  <line x1="24" y1="25" x2="24" y2="29" stroke="#fff" stroke-width="0.5"/>
  <line x1="22" y1="27" x2="26" y2="27" stroke="#fff" stroke-width="0.5"/>
  <line x1="32" y1="25" x2="32" y2="29" stroke="#fff" stroke-width="0.5"/>
  <line x1="30" y1="27" x2="34" y2="27" stroke="#fff" stroke-width="0.5"/>

  <!-- Door - arched art deco -->
  <rect x="20" y="34" width="8" height="8" fill="#fff"/>
  <path d="M20 36 Q20 32 24 32 Q28 32 28 36" fill="#fff" stroke="#fff" stroke-width="0"/>
  <!-- Door detail -->
  <line x1="24" y1="34" x2="24" y2="42" stroke="#fff" stroke-width="0.5"/>
  <!-- Door arch detail -->
  <path d="M21 35 Q21 33 24 33 Q27 33 27 35" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Art deco chevron above door -->
  <polyline points="20,32 24,30 28,32" fill="none" stroke="#fff" stroke-width="0.75"/>

  <!-- Base/foundation -->
  <rect x="8" y="42" width="32" height="2" fill="#fff"/>
  <!-- Stepped base detail -->
  <rect x="6" y="44" width="36" height="1.5" fill="#fff"/>
</svg>